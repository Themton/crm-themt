<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ProShip Orders — ระบบจัดการออเดอร์</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📦</text></svg>"/>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet"/>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.development.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.development.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Noto Sans Thai',sans-serif;background:#f0f2f7}
    @keyframes slideDown{from{opacity:0;transform:translateY(-16px)}to{opacity:1;transform:translateY(0)}}
    @keyframes fadeIn{from{opacity:0}to{opacity:1}}
    @keyframes popIn{from{opacity:0;transform:scale(.95)}to{opacity:1;transform:scale(1)}}
    @keyframes shake{0%,100%{transform:translateX(0)}20%,60%{transform:translateX(-6px)}40%,80%{transform:translateX(6px)}}
    @keyframes spin{to{transform:rotate(360deg)}}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
    textarea:focus,input:focus,select:focus{border-color:#818cf8!important;box-shadow:0 0 0 3px rgba(129,140,248,.15)!important}
    ::-webkit-scrollbar{width:6px}::-webkit-scrollbar-thumb{background:#c7d2fe;border-radius:3px}
    .shake{animation:shake .4s ease}
    .spin{animation:spin .8s linear infinite}
    .pulse{animation:pulse 1.5s infinite}
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const{useState,useCallback,useMemo,useRef,useEffect}=React;

// ================================================================
// API — เชื่อมต่อ Google Sheets ผ่าน Apps Script
// ================================================================
function getApiUrl(){return localStorage.getItem("ps_api_url")||"";}
function setApiUrl(url){localStorage.setItem("ps_api_url",url);}

async function api(action,params,postData){
  const base=getApiUrl();
  if(!base)throw new Error("NO_API");
  try{
    const url=new URL(base);
    url.searchParams.set("action",action);
    if(params)Object.entries(params).forEach(function(kv){url.searchParams.set(kv[0],kv[1]);});
    var opts={redirect:"follow"};
    if(postData){opts.method="POST";opts.body=JSON.stringify(postData);}else{opts.method="GET";}
    var res=await fetch(url.toString(),opts);
    var text=await res.text();
    var data;
    try{data=JSON.parse(text);}catch(pe){throw new Error("Invalid response");}
    if(data&&!data.success&&data.error)throw new Error(data.error);
    return data||{success:true};
  }catch(e){
    console.error("API Error ["+action+"]:",e);
    throw e;
  }
}

// ================================================================
// SMART PARSER
// ================================================================
function smartParse(text){
  const t=text.trim();if(!t)return null;
  const r={MobileNo:"",Name:"",Address:"",SubDistrict:"",District:"",ZIP:"",SalePrice:"",COD:"",Remark:"",Product:""};
  const pm=t.match(/\b(0[689]\d[\s-]?\d{3,4}[\s-]?\d{4})\b/);if(pm)r.MobileNo=pm[1].replace(/[\s-]/g,"");
  const zm=t.match(/\b(\d{5})\b/);if(zm)r.ZIP=zm[1];
  for(const p of[/ปลายทาง\s*(\d[\d,]*)\s*(?:บาท)?/i,/(?:COD|cod)\s*[:=]?\s*(\d[\d,]*)/i,/(\d[\d,]*)\s*บาท/,/ราคา\s*[:=]?\s*(\d[\d,]*)/i]){const m=t.match(p);if(m){r.COD=r.SalePrice=m[1].replace(/,/g,"");break;}}
  for(const p of[/(Kiso\S*(?:\s*\([^)]*\))?)/i,/สินค้า\s*[:：]?\s*([^\n]+)/]){const m=t.match(p);if(m){r.Product=m[1].trim();break;}}
  const provs=["กรุงเทพ","กทม","กรุงเทพมหานคร","นนทบุรี","ปทุมธานี","สมุทรปราการ","เชียงใหม่","เชียงราย","นครราชสีมา","ขอนแก่น","อุดรธานี","ชลบุรี","ระยอง","ภูเก็ต","สงขลา","พิษณุโลก","ราชบุรี","กาญจนบุรี","นครปฐม","ลพบุรี","สระบุรี","อยุธยา","เพชรบุรี"];
  const lines=t.split(/\n/).map(l=>l.trim()).filter(Boolean);
  const nl=lines.find(l=>/^(คุณ|นาย|นาง|น\.?ส\.?|นางสาว|mr\.?|mrs\.?)/i.test(l));
  if(nl){let n=nl;if(r.MobileNo)n=n.replace(r.MobileNo,"");r.Name=n.replace(/\d{5}/,"").trim();}
  const al=lines.find(l=>/\d+[\s/]|ถนน|ถ\.|ซอย|ซ\.|หมู่/.test(l)&&l!==r.Name);
  if(al){let rem=al;if(r.ZIP)rem=rem.replace(r.ZIP,"");["กทม","กรุงเทพมหานคร",...provs].forEach(p=>{rem=rem.replace(p,"")});rem=rem.trim();
    const sdm=t.match(/(?:ต\.|ตำบล|แขวง)\s*(\S+)/),dm=t.match(/(?:อ\.|อำเภอ|เขต)\s*(\S+)/);
    if(sdm)r.SubDistrict=sdm[1];if(dm)r.District=dm[1];
    if(!r.SubDistrict||!r.District){const pts=rem.split(/\s+/).filter(p=>p.length>0);if(pts.length>=3){let ae=0;for(let i=0;i<pts.length;i++){if(/\d|ถนน|ถ\.|ซอย|หมู่/.test(pts[i]))ae=i+1;}const af=pts.slice(ae);if(!r.SubDistrict&&af.length>=1)r.SubDistrict=af[0];if(!r.District&&af.length>=2)r.District=af[1];r.Address=pts.slice(0,ae).join(" ");}else r.Address=rem;}
    else{let a=rem;if(r.SubDistrict)a=a.replace(r.SubDistrict,"");if(r.District)a=a.replace(r.District,"");r.Address=a.replace(/(?:ต\.|ตำบล|แขวง|อ\.|อำเภอ|เขต)\s*/g,"").trim();}
  }
  if(r.Product)r.Remark=t.includes("ปลายทาง")?r.Product+" ปลายทาง":r.Product;
  return r;
}

// ================================================================
// ERROR BOUNDARY
// ================================================================
class ErrorBoundary extends React.Component{
  constructor(props){super(props);this.state={hasError:false,error:null};}
  static getDerivedStateFromError(error){return{hasError:true,error};}
  render(){
    if(this.state.hasError){
      return React.createElement("div",{style:{padding:40,textAlign:"center",fontFamily:"'Noto Sans Thai',sans-serif"}},
        React.createElement("div",{style:{fontSize:48,marginBottom:16}},"⚠️"),
        React.createElement("h2",{style:{color:"#dc2626",marginBottom:8}},"เกิดข้อผิดพลาด"),
        React.createElement("p",{style:{color:"#64748b",marginBottom:16}},String(this.state.error)),
        React.createElement("button",{onClick:function(){window.location.reload();},style:{padding:"10px 24px",borderRadius:10,border:"none",background:"#6366f1",color:"#fff",fontSize:14,fontWeight:700,cursor:"pointer"}},"🔄 รีโหลดหน้า")
      );
    }
    return this.props.children;
  }
}

// ================================================================
// APP
// ================================================================
function App(){
  const[apiOk,setApiOk]=useState(!!getApiUrl());
  const[user,setUser]=useState(null);
  const[accounts,setAccounts]=useState([]);
  const[orders,setOrders]=useState([]);
  const[page,setPage]=useState("orders");
  const[showForm,setShowForm]=useState(false);
  const[search,setSearch]=useState("");
  const[reportType,setReportType]=useState("daily");
  const[notif,setNotif]=useState(null);
  const[viewOrder,setViewOrder]=useState(null);
  const[loading,setLoading]=useState(false);
  const[upsellIds,setUpsellIds]=useState([]);
  const userRef=useRef(null);

  function notify(msg,type){setNotif({msg:msg,type:type||"success"});setTimeout(function(){setNotif(null);},3500);}

  async function loadAccounts(){
    try{var d=await api("getAccounts");setAccounts(d.accounts||[]);}catch(e){if(e.message==="NO_API")setApiOk(false);}
  }

  async function loadOrders(u){
    var cu=u||userRef.current;
    if(!cu)return;
    try{
      var uid=cu.role==="admin"?"ALL":cu.username;
      var d=await api("getOrders",{userId:uid});
      setOrders(d.orders||[]);
    }catch(e){console.error("loadOrders error",e);}
  }

  async function loadUpsellIds(){
    try{var d=await api("getUpsellIds");setUpsellIds(d.ids||[]);}catch(e){}
  }

  // โหลดบัญชีเมื่อมี API
  useEffect(function(){if(apiOk){loadAccounts();}},[apiOk]);

  // เมื่อ Login สำเร็จ → โหลดข้อมูล
  function handleLogin(acc){
    userRef.current=acc;
    setUser(acc);
    loadOrders(acc);
    if(acc.role==="admin")loadUpsellIds();
  }

  // ถ้ายังไม่มี API URL → หน้าตั้งค่า
  if(!apiOk)return<SetupScreen onSave={url=>{setApiUrl(url);setApiOk(true);}} />;
  // ถ้ายังไม่ Login
  if(!user)return<LoginScreen accounts={accounts} onLogin={handleLogin} onReload={loadAccounts} onSetup={function(){setApiOk(false);}} />;

  var isAdmin=user.role==="admin";
  var filtered=orders;
  if(search){var sl=search.toLowerCase();filtered=orders.filter(function(o){return(o.Name||"").toLowerCase().indexOf(sl)>=0||(String(o.MobileNo||"")).indexOf(sl)>=0||(o.OrderID||"").toLowerCase().indexOf(sl)>=0||(o.District||"").toLowerCase().indexOf(sl)>=0||(o.SalesPerson||"").toLowerCase().indexOf(sl)>=0||(o.Remark||"").toLowerCase().indexOf(sl)>=0;});}
  var totalSales=0,totalCOD=0;
  orders.forEach(function(o){totalSales+=Number(o.SalePrice)||0;totalCOD+=Number(o.COD)||0;});
  var stats={total:orders.length,totalSales:totalSales,totalCOD:totalCOD};

  const addOrder=async data=>{
    setLoading(true);
    try{
      const res=await api("addOrder",{},{...data,UserID:user.username,SalesPerson:user.displayName,SalesChannel:"CRM"});
      notify(`สร้าง ${res.orderId} สำเร็จ!`);setShowForm(false);await loadOrders();
    }catch(e){notify("เกิดข้อผิดพลาด: "+e.message,"warning");}
    setLoading(false);
  };
  const delOrder=async oid=>{
    setLoading(true);
    try{await api("deleteOrder",{orderId:oid});notify("ลบสำเร็จ");setViewOrder(null);await loadOrders();}catch(e){notify("ลบผิดพลาด","warning");}
    setLoading(false);
  };
  const upsellOrder=async oid=>{
    try{
      await api("upsellOrder",{},{orderId:oid,upsellBy:user.displayName});
      notify("🔥 Upsell สำเร็จ → ส่งไปตาราง Upsell แล้ว!");
      setUpsellIds(prev=>[...prev,oid]);
    }catch(e){notify(e.message||"Upsell ผิดพลาด","warning");}
  };
  const addAcc=async acc=>{
    try{const r=await api("addAccount",{},acc);if(r.success){notify("เพิ่ม "+acc.displayName+" สำเร็จ!");await loadAccounts();return true;}else{notify(r.error||"ผิดพลาด","warning");return false;}}catch(e){notify(e.message,"warning");return false;}
  };
  const toggleAcc=async u=>{try{await api("toggleAccount",{username:u});await loadAccounts();}catch(e){notify("ผิดพลาด","warning");}};
  const delAcc=async u=>{try{await api("deleteAccount",{username:u});notify("ลบแล้ว","warning");await loadAccounts();}catch(e){notify("ผิดพลาด","warning");}};
  const resetPw=async(u,pw)=>{try{await api("resetPassword",{},{username:u,password:pw});notify("รีเซ็ตรหัสผ่านแล้ว");await loadAccounts();}catch(e){notify("ผิดพลาด","warning");}};

  return(
    <div style={S.app}>
      {notif&&<div style={{...S.notif,background:notif.type==="success"?"linear-gradient(135deg,#10b981,#059669)":"linear-gradient(135deg,#f59e0b,#d97706)"}}><span style={{fontSize:18}}>{notif.type==="success"?"✅":"⚠️"}</span>{notif.msg}</div>}
      {loading&&<div style={S.loadingBar}><div style={{width:120,height:4,borderRadius:2,background:"rgba(255,255,255,.2)",overflow:"hidden"}}><div className="pulse" style={{width:"60%",height:"100%",background:"#c7d2fe",borderRadius:2}}/></div></div>}

      <aside style={S.sidebar}>
        <div style={S.sidebarHead}><span style={{fontSize:30}}>📦</span><div><div style={S.logoText}>ProShip</div><div style={S.logoSub}>ORDER MANAGEMENT</div></div></div>
        <div style={S.userCard}><div style={S.avatarCircle}>{(user.displayName||"?").charAt(0)}</div><div><div style={{fontWeight:700,fontSize:14}}>{user.displayName}</div><div style={{fontSize:11,color:"#a5b4fc",marginTop:2}}>@{user.username}</div><span style={{padding:"2px 8px",borderRadius:6,fontSize:10,fontWeight:700,background:isAdmin?"rgba(250,204,21,.2)":"rgba(129,140,248,.2)",color:isAdmin?"#fbbf24":"#a5b4fc"}}>{isAdmin?"แอดมิน":"พนักงาน"}</span></div></div>
        <nav style={S.nav}>
          {[{id:"orders",icon:"📋",label:"ออเดอร์"},{id:"report",icon:"📊",label:"รายงานยอดขาย"},...(isAdmin?[{id:"team",icon:"👥",label:"จัดการบัญชี"}]:[])].map(item=>(
            <button key={item.id} style={{...S.navItem,...(page===item.id?S.navActive:{})}} onClick={()=>setPage(item.id)}><span style={{fontSize:18}}>{item.icon}</span>{item.label}</button>
          ))}
        </nav>
        <div style={{padding:"0 12px 8px"}}><button style={{...S.sm,width:"100%",background:"rgba(255,255,255,.06)",color:"#a5b4fc",padding:10}} onClick={loadOrders}>🔄 รีเฟรชข้อมูล</button></div>
        <button style={S.logoutBtn} onClick={function(){userRef.current=null;setUser(null);setOrders([]);setUpsellIds([]);}}>🚪 ออกจากระบบ</button>
      </aside>

      <main style={S.main}>
        {page==="orders"&&<OrdersPage orders={filtered} stats={stats} search={search} setSearch={setSearch} showForm={showForm} setShowForm={setShowForm} onAdd={addOrder} onDel={delOrder} onUpsell={upsellOrder} upsellIds={upsellIds} user={user} viewOrder={viewOrder} setViewOrder={setViewOrder} isAdmin={isAdmin} loading={loading}/>}
        {page==="report"&&<ReportPage user={user} reportType={reportType} setReportType={setReportType}/>}
        {page==="team"&&isAdmin&&<TeamPage accounts={accounts} onAdd={addAcc} onToggle={toggleAcc} onDel={delAcc} onResetPw={resetPw}/>}
      </main>
    </div>
  );
}

// ================================================================
// SETUP SCREEN — ใส่ Google Apps Script URL
// ================================================================
function SetupScreen({onSave}){
  const[url,setUrl]=useState(getApiUrl()||"");
  const[testing,setTesting]=useState(false);
  const[error,setError]=useState("");

  const handleTest=async()=>{
    if(!url.trim()){setError("กรุณาวาง URL");return;}
    setTesting(true);setError("");
    try{
      const testUrl=new URL(url.trim());
      testUrl.searchParams.set("action","getAccounts");
      const res=await fetch(testUrl.toString(),{redirect:"follow"});
      const data=await res.json();
      if(data.success){onSave(url.trim());}
      else setError("เชื่อมต่อได้แต่ response ผิดปกติ");
    }catch(e){setError("เชื่อมต่อไม่สำเร็จ — ตรวจสอบ URL และการ Deploy");}
    setTesting(false);
  };

  return(
    <div style={S.loginBg}>
      <div style={{...S.loginCard,maxWidth:520}}>
        <div style={{textAlign:"center",marginBottom:32}}>
          <div style={{fontSize:56,marginBottom:8}}>📦</div>
          <h1 style={{fontSize:26,fontWeight:800,color:"#1e1b4b",letterSpacing:-1,margin:"0 0 6px"}}>ProShip Orders</h1>
          <p style={{fontSize:14,color:"#64748b"}}>เชื่อมต่อ Google Sheets เพื่อเริ่มใช้งาน</p>
        </div>

        <div style={{background:"#f8fafc",borderRadius:14,padding:20,marginBottom:20,border:"1px solid #e2e8f0"}}>
          <h3 style={{fontSize:15,fontWeight:700,marginBottom:12}}>📖 วิธีติดตั้ง (ทำครั้งเดียว)</h3>
          {["สร้าง Google Sheet ใหม่","ไปที่ Extensions > Apps Script","ลบโค้ดเดิม → วางโค้ดจากไฟล์ google-apps-script.js","กด Save → กด ▶ Run → เลือก initSheet → อนุญาตสิทธิ์","Deploy > New deployment > Web app > Anyone","คัดลอก URL มาวางด้านล่าง"].map((s,i)=>(
            <div key={i} style={{display:"flex",gap:10,alignItems:"flex-start",marginBottom:8}}>
              <div style={{width:24,height:24,borderRadius:"50%",background:"linear-gradient(135deg,#6366f1,#8b5cf6)",color:"#fff",display:"flex",alignItems:"center",justifyContent:"center",fontSize:12,fontWeight:700,flexShrink:0}}>{i+1}</div>
              <div style={{fontSize:13,color:"#334155",paddingTop:2}}>{s}</div>
            </div>
          ))}
        </div>

        <label style={{display:"block",fontSize:13,fontWeight:600,color:"#475569",marginBottom:6}}>🔗 Google Apps Script URL</label>
        <input value={url} onChange={e=>{setUrl(e.target.value);setError("");}} placeholder="https://script.google.com/macros/s/xxxxx/exec"
          style={{width:"100%",padding:"12px 16px",borderRadius:12,border:"1.5px solid #e2e8f0",fontSize:14,color:"#1e293b",outline:"none",background:"#fafbff",boxSizing:"border-box",marginBottom:12}}/>

        {error&&<div style={{background:"#fef2f2",color:"#dc2626",padding:"10px 14px",borderRadius:10,fontSize:13,fontWeight:600,marginBottom:12,border:"1px solid #fecaca"}}>❌ {error}</div>}

        <button onClick={handleTest} disabled={testing}
          style={{width:"100%",padding:"14px",borderRadius:12,border:"none",background:testing?"#94a3b8":"linear-gradient(135deg,#6366f1,#8b5cf6)",color:"#fff",fontSize:16,fontWeight:700,cursor:testing?"wait":"pointer",boxShadow:"0 4px 14px rgba(99,102,241,.35)"}}>
          {testing?"⏳ กำลังทดสอบ...":"🔗 เชื่อมต่อ & เริ่มใช้งาน"}
        </button>
      </div>
    </div>
  );
}

// ================================================================
// LOGIN
// ================================================================
function LoginScreen({accounts,onLogin,onReload,onSetup}){
  const[username,setUsername]=useState("");
  const[password,setPassword]=useState("");
  const[error,setError]=useState("");
  const[showPw,setShowPw]=useState(false);
  const ref=useRef(null);
  const shake=function(){if(ref.current){ref.current.classList.remove("shake");void ref.current.offsetWidth;ref.current.classList.add("shake");}};

  const handleLogin=()=>{
    if(!username||!password){setError("กรุณากรอก Username และ Password");shake();return;}
    const acc=accounts.find(a=>a.username===username);
    if(!acc){setError("ไม่พบ Username นี้");shake();return;}
    if(!acc.active){setError("บัญชีถูกระงับ");shake();return;}
    if(acc.password!==password){setError("Password ไม่ถูกต้อง");shake();return;}
    onLogin(acc);
  };

  return(
    <div style={S.loginBg}>
      <div ref={ref} style={S.loginCard}>
        <div style={{textAlign:"center",marginBottom:36}}>
          <div style={{fontSize:56,marginBottom:8}}>📦</div>
          <h1 style={{fontSize:28,fontWeight:800,color:"#1e1b4b",letterSpacing:-1,margin:"0 0 6px"}}>ProShip Orders</h1>
          <p style={{fontSize:14,color:"#64748b"}}>ระบบจัดการออเดอร์ — Google Sheets</p>
          <div style={{display:"inline-flex",alignItems:"center",gap:6,marginTop:8,padding:"4px 12px",borderRadius:8,background:"#d1fae5",color:"#059669",fontSize:12,fontWeight:600}}>🟢 เชื่อมต่อ Google Sheets แล้ว</div>
        </div>
        <div style={{marginBottom:20}}>
          <label style={{display:"block",fontSize:13,fontWeight:600,color:"#475569",marginBottom:6}}>👤 Username</label>
          <input value={username} onChange={e=>{setUsername(e.target.value);setError("");}} onKeyDown={e=>{if(e.key==="Enter"){var el=document.getElementById("pw");if(el)el.focus();}}} placeholder="ชื่อผู้ใช้" autoFocus autoComplete="username"
            style={{width:"100%",padding:"12px 16px",borderRadius:12,border:"1.5px solid #e2e8f0",fontSize:15,outline:"none",background:"#fafbff",boxSizing:"border-box"}}/>
        </div>
        <div style={{marginBottom:24}}>
          <label style={{display:"block",fontSize:13,fontWeight:600,color:"#475569",marginBottom:6}}>🔒 Password</label>
          <div style={{position:"relative"}}>
            <input id="pw" type={showPw?"text":"password"} value={password} onChange={e=>{setPassword(e.target.value);setError("");}} onKeyDown={e=>{if(e.key==="Enter")handleLogin();}} placeholder="รหัสผ่าน" autoComplete="current-password"
              style={{width:"100%",padding:"12px 48px 12px 16px",borderRadius:12,border:"1.5px solid #e2e8f0",fontSize:15,outline:"none",background:"#fafbff",boxSizing:"border-box"}}/>
            <button onClick={()=>setShowPw(!showPw)} style={{position:"absolute",right:12,top:"50%",transform:"translateY(-50%)",border:"none",background:"none",cursor:"pointer",fontSize:18,color:"#94a3b8"}}>{showPw?"🙈":"👁"}</button>
          </div>
        </div>
        {error&&<div style={{background:"#fef2f2",color:"#dc2626",padding:"10px 14px",borderRadius:10,fontSize:13,fontWeight:600,marginBottom:16,border:"1px solid #fecaca"}}>❌ {error}</div>}

function TeamPage({accounts,onAdd,onToggle,onDel,onResetPw}){

      {show&&(<div style={{...S.formCard,animation:"slideDown .3s"}}><h3 style={{margin:"0 0 16px",fontSize:16,fontWeight:700}}>➕ สร้างบัญชีใหม่</h3>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:16}}>
          <div><label style={S.fLabel}>🆔 Username</label><input value={nf.username} onChange={e=>setNf(p=>({...p,username:e.target.value}))} placeholder="username" style={S.pInput}/></div>
          <div><label style={S.fLabel}>👤 ชื่อที่แสดง</label><input value={nf.displayName} onChange={e=>setNf(p=>({...p,displayName:e.target.value}))} placeholder="ชื่อเล่น" style={S.pInput}/></div>
          <div><label style={S.fLabel}>🔒 Password</label><input type="password" value={nf.password} onChange={e=>setNf(p=>({...p,password:e.target.value}))} placeholder="อย่างน้อย 4 ตัว" style={S.pInput}/></div>
          <div><label style={S.fLabel}>🏷 บทบาท</label><select value={nf.role} onChange={e=>setNf(p=>({...p,role:e.target.value}))} style={S.pInput}><option value="user">พนักงาน</option><option value="admin">แอดมิน</option></select></div>
        </div>
        <div style={{display:"flex",justifyContent:"flex-end",gap:10}}><button style={S.cancelBtn} onClick={()=>setShow(false)}>ยกเลิก</button><button style={S.submitBtn} onClick={handleAdd}>✅ สร้างบัญชี</button></div>
      </div>)}
      {resetId&&(<div style={S.modalOverlay} onClick={()=>setResetId(null)}><div style={{background:"#fff",borderRadius:16,padding:28,width:"100%",maxWidth:400,animation:"popIn .2s"}} onClick={e=>e.stopPropagation()}><h3 style={{margin:"0 0 16px",fontSize:16,fontWeight:700}}>🔑 รีเซ็ต PW — @{resetId}</h3><label style={S.fLabel}>Password ใหม่</label><input type="password" value={newPw} onChange={e=>setNewPw(e.target.value)} placeholder="อย่างน้อย 4 ตัว" style={{...S.pInput,marginBottom:16}}/><div style={{display:"flex",gap:10,justifyContent:"flex-end"}}><button style={S.cancelBtn} onClick={()=>setResetId(null)}>ยกเลิก</button><button style={S.submitBtn} onClick={()=>{if(newPw.length<4){alert("อย่างน้อย 4 ตัว");return;}onResetPw(resetId,newPw);setResetId(null);setNewPw("");}}>บันทึก</button></div></div></div>)}

  const[loading,setLoading]=useState(true);
  useEffect(()=>{
    (async()=>{setLoading(true);try{const uid=user.role==="admin"?"ALL":user.username;const r=await api("getSalesReport",{type:reportType,userId:uid});setData(r.report||[]);setSummary(r.summary||{});}catch(e){console.error(e);}setLoading(false);})();
  },[reportType,user]);
  const mx=Math.max(...data.map(d=>d.totalSales),1);
  return(
    <div>
      <div style={S.pageHeader}><div><h1 style={S.pageTitle}>📊 รายงานยอดขาย</h1><p style={S.pageSub}>สรุป{reportType==="daily"?"รายวัน":"รายเดือน"} — Google Sheets</p></div><div style={{display:"flex",gap:6}}>{["daily","monthly"].map(t=>(<button key={t} onClick={()=>setReportType(t)} style={{padding:"10px 18px",borderRadius:10,border:"1px solid #e2e8f0",fontSize:13,fontWeight:600,cursor:"pointer",...(reportType===t?{background:"#6366f1",color:"#fff",borderColor:"#6366f1"}:{background:"#fff",color:"#64748b"})}}>{t==="daily"?"📅 รายวัน":"📆 รายเดือน"}</button>))}</div></div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(180px,1fr))",gap:16,marginBottom:24}}>
        {[{i:"📦",l:"ออเดอร์",v:summary.totalOrders,c:"#6366f1"},{i:"💰",l:"ยอดขาย",v:"฿"+(summary.totalSales||0).toLocaleString(),c:"#10b981"},{i:"💵",l:"ยอด COD",v:"฿"+(summary.totalCOD||0).toLocaleString(),c:"#f59e0b"},{i:"📈",l:"เฉลี่ย",v:summary.totalOrders?"฿"+Math.round(summary.totalSales/summary.totalOrders).toLocaleString():"฿0",c:"#8b5cf6"}].map((s,i)=>(<div key={i} style={{padding:24,borderRadius:16,border:"1px solid "+s.c+"33",background:"linear-gradient(135deg,"+s.c+"08,"+s.c+"15)",textAlign:"center"}}><div style={{fontSize:32}}>{s.i}</div><div style={{fontSize:26,fontWeight:800,color:s.c,margin:"8px 0 4px"}}>{s.v}</div><div style={{fontSize:13,color:"#64748b"}}>{s.l}</div></div>))}
      </div>
      <div style={{background:"#fff",borderRadius:16,padding:24,marginBottom:24,boxShadow:"0 1px 4px rgba(0,0,0,.04)"}}>
        <h3 style={{fontSize:16,fontWeight:700,margin:"0 0 20px"}}>{reportType==="daily"?"ยอดขายรายวัน":"ยอดขายรายเดือน"}</h3>
        {loading?<div style={{textAlign:"center",padding:40,color:"#94a3b8"}}>⏳ กำลังโหลด...</div>:data.length===0?<div style={{textAlign:"center",padding:40,color:"#94a3b8"}}>ไม่มีข้อมูล</div>:data.slice(0,14).map(d=>(<div key={d.date} style={{display:"flex",alignItems:"center",gap:12,marginBottom:8}}><div style={{width:90,fontSize:12,fontWeight:600,color:"#475569",textAlign:"right",flexShrink:0}}>{d.date}</div><div style={{flex:1,height:28,background:"#f1f5f9",borderRadius:8,overflow:"hidden"}}><div style={{height:"100%",width:(d.totalSales/mx)*100+"%",background:"linear-gradient(90deg,#6366f1,#8b5cf6)",borderRadius:8,minWidth:4}}/></div><div style={{width:130,fontSize:12,fontWeight:600,flexShrink:0}}>฿{d.totalSales.toLocaleString()} <span style={{color:"#94a3b8"}}>({d.orders})</span></div></div>))}
      </div>
      <div style={S.tableWrap}><table style={S.table}><thead><tr>{["วันที่","ออเดอร์","ยอดขาย","COD","พนักงาน"].map((h,i)=><th key={i} style={S.th}>{h}</th>)}</tr></thead><tbody>{data.map(d=>(<tr key={d.date}><td style={{...S.td,fontWeight:600}}>{d.date}</td><td style={S.td}>{d.orders}</td><td style={{...S.td,fontWeight:700,color:"#6366f1"}}>฿{d.totalSales.toLocaleString()}</td><td style={S.td}>฿{d.totalCOD.toLocaleString()}</td><td style={S.td}><div style={{display:"flex",gap:4,flexWrap:"wrap"}}>{d.people&&Object.entries(d.people).map(([p,n])=><span key={p} style={{padding:"2px 8px",borderRadius:4,background:"#f0fdf4",fontSize:11,color:"#059669",fontWeight:600}}>{p}:{n}</span>)}</div></td></tr>))}</tbody></table></div>
    </div>
  );
}

function DR({l,v,hl}){return<div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}><span style={{fontSize:13,color:"#94a3b8"}}>{l}</span><span style={{fontSize:13,fontWeight:hl?700:500,color:hl?"#6366f1":"#1e293b",textAlign:"right",maxWidth:"65%"}}>{v}</span></div>;}
